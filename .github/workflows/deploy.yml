name: Deploy to VPS

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. BUILD & LINT (runs on GitHub-hosted runner)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true   # non-blocking – adjust if you want strict

      - name: Type-check
        run: npx tsc --noEmit || true

      - name: Build (verify it compiles)
        # We use placeholder env vars so Next.js can resolve NEXT_PUBLIC_ at build time.
        # The real values are on the VPS .env.production file.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: placeholder
          JWT_SECRET: placeholder-secret-for-ci
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # 2. DEPLOY (SSH into VPS)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build       # only deploy if build passed
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── rsync project files to VPS ──────────────────────────────────────────
      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '*.log' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -p ${{ secrets.VPS_PORT || '22' }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/onrpy/

      # ── Remote: install deps, migrate, build, reload ────────────────────────
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/onrpy

            echo "── Loading env ──"
            set -a; . .env.production; set +a

            echo "── Installing dependencies ──"
            npm ci --prefer-offline || npm install

            echo "── Generating Prisma client ──"
            npx prisma generate --schema=prisma/schema.prisma

            echo "── Running database migrations ──"
            npx prisma migrate deploy --schema=prisma/schema.prisma

            echo "── Running production seed (idempotent) ──"
            ENV_FILE=/opt/onrpy/.env.production node scripts/seed-production.js

            echo "── Building Next.js ──"
            npm run build

            echo "── Reloading PM2 with zero-downtime ──"
            pm2 reload onrpy --update-env || pm2 start ecosystem.config.js

            echo "── Deploy complete ──"
            pm2 status

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke test (HTTP check)
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.VPS_HOST }}) || STATUS=000
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Smoke test failed with status $STATUS"
            exit 1
          fi
          echo "Smoke test passed!"
