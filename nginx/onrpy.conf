# onrpy – Nginx Configuration Template
# ─────────────────────────────────────────────────────────────────────────────
# This file is a TEMPLATE. The install-vps.sh installer generates the live
# config at /etc/nginx/sites-available/onrpy automatically.
#
# To use manually:
#   1. Replace YOUR_DOMAIN_OR_IP with your actual domain or IP.
#   2. Copy to /etc/nginx/sites-available/onrpy
#   3. ln -sf /etc/nginx/sites-available/onrpy /etc/nginx/sites-enabled/onrpy
#   4. nginx -t && systemctl restart nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: serve app (and ACME challenges) ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    # Let's Encrypt ACME challenge – must be reachable over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # After SSL is installed, replace the location block below with:
    #   return 301 https://$host$request_uri;
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

